<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Settlement Engine | Institutional Grade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .token-card { background: #1e293b; border-radius: 0.75rem; padding: 1rem; border: 1px solid #334155; transition: 0.3s; }
        .token-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .status-badge { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .action-btn { background: linear-gradient(90deg, #2563eb, #1d4ed8); border-radius: 0.5rem; transition: all 0.3s; }
        .action-btn:hover { box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white">ARC <span class="text-blue-500">SETTLEMENT</span></h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Institutional Asset Engine v3.0</p>
        </div>
        <div class="bg-blue-600/10 p-3 rounded-2xl border border-blue-500/20">
            <i class="fa-solid fa-shield-halved text-blue-500 text-xl"></i>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass-card p-3 flex items-center justify-between">
            <span class="text-[10px] text-slate-400 uppercase font-bold">Network</span>
            <span class="status-badge">Arc Testnet</span>
        </div>
        <div class="glass-card p-3 flex items-center justify-between">
            <span class="text-[10px] text-slate-400 uppercase font-bold">Speed</span>
            <span class="text-[10px] text-blue-400 font-bold">~0.2s Latency</span>
        </div>
    </div>

    <div class="glass-card p-6 mb-8 text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fa-solid fa-vault text-6xl"></i></div>
        <p class="text-[11px] text-slate-500 uppercase font-black mb-1">Total Engine Liquidity</p>
        <h2 class="text-5xl font-black tracking-tight mb-2">0.00 <span class="text-xl text-slate-600 italic">USDC</span></h2>
        <div class="flex justify-center gap-4 mt-4">
            <div class="text-[10px] font-bold text-yellow-500 bg-yellow-500/10 px-3 py-1 rounded">USYC: 0.00</div>
            <div class="text-[10px] font-bold text-cyan-400 bg-cyan-400/10 px-3 py-1 rounded">FURC: 0.00</div>
        </div>
    </div>

    <div class="glass-card p-6 mb-8">
        <h3 class="text-xs font-black text-blue-400 uppercase mb-6 flex items-center">
            <i class="fa-solid fa-bolt-lightning mr-2"></i> Instant Settlement Route
        </h3>
        
        <div class="space-y-4">
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Destination Address</label>
                <input type="text" placeholder="0x..." class="w-full bg-slate-900/50 border border-slate-800 p-4 rounded-xl text-sm outline-none focus:border-blue-500 font-mono">
            </div>
            
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Asset</label>
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl text-sm flex items-center justify-between cursor-pointer">
                        <span>USDC (Arc)</span>
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </div>
                </div>
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Amount</label>
                    <input type="number" placeholder="0.00" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-sm outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="bg-slate-950 p-4 rounded-xl border border-dashed border-slate-800 my-4">
                <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase mb-2">
                    <span>Route Strategy</span>
                    <span class="text-green-500">Fastest Path Found</span>
                </div>
                <div class="flex items-center gap-2 text-xs text-slate-300">
                    <i class="fa-solid fa-circle-nodes text-blue-500"></i>
                    <span>Arc Node</span>
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    <i class="fa-solid fa-link text-blue-500"></i>
                    <span>CCTP Relay</span>
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    <i class="fa-solid fa-wallet text-green-500"></i>
                    <span>Settled</span>
                </div>
            </div>

            <button onclick="handleSettlement()" class="w-full action-btn py-5 text-xs font-black uppercase tracking-[0.2em]">Execute Secure Settlement</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-950 border-t border-slate-800 p-4 flex justify-around">
        <i class="fa-solid fa-house text-blue-500"></i>
        <i class="fa-solid fa-chart-line text-slate-600"></i>
        <i class="fa-solid fa-clock-rotate-left text-slate-600"></i>
        <i class="fa-solid fa-user-shield text-slate-600"></i>
    </div>

    <script>
        function handleSettlement() {
            alert("Settlement Engine: Analyzing Route...");
            setTimeout(() => {
                alert("Broadcasting to Arc Network Nodes...");
                setTimeout(() => {
                    alert("✅ SUCCESS: Settlement Finalized on Arc Testnet");
                }, 2000);
            }, 1500);
        }
    </script>
</body>
    </html>
