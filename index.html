<script>
let provider, signer, userAddress, currentMode = 'bridge';

/* =========================
   🔹 HISTORY SYSTEM
========================= */

function saveHistory(item) {
    let history = JSON.parse(localStorage.getItem("arc_history")) || [];
    history.unshift(item);
    localStorage.setItem("arc_history", JSON.stringify(history));
}

function loadHistory() {
    let history = JSON.parse(localStorage.getItem("arc_history")) || [];
    const log = document.getElementById('historyLog');
    log.innerHTML = "";

    if (history.length === 0) {
        log.innerHTML = `<p class="text-[9px] text-slate-600 italic text-center mt-8 uppercase font-bold opacity-50">No Activity Found</p>`;
        return;
    }

    history.forEach(tx => renderHistory(tx));
}

function renderHistory(tx) {
    const log = document.getElementById('historyLog');

    const item = document.createElement('div');
    item.className = "history-item flex justify-between items-center";
    item.innerHTML = `
        <div>
            <span class="text-blue-400 font-black text-[10px]">${tx.type}</span> 
            <span class="text-white ml-2 font-black text-[12px]">${tx.amount} ${tx.asset}</span>
            <p class="text-[7px] text-slate-500 font-mono mt-1">To: ${tx.address.substring(0,20)}...</p>
        </div>
        <div class="text-right">
            <span class="text-[7px] text-slate-500">${tx.time}</span>
            <span class="text-[6px] text-green-500 uppercase">${tx.status}</span>
        </div>
    `;
    log.prepend(item);
}

function addHistory(type, amt, asset, addr, status="Pending") {
    const tx = {
        type: type,
        amount: amt,
        asset: asset,
        address: addr,
        time: new Date().toLocaleTimeString(),
        status: status
    };

    saveHistory(tx);
    renderHistory(tx);
}

/* =========================
   🔹 WALLET
========================= */

async function connectWallet() {
    const ethProvider = window.ethereum || (window.rabby ? window.rabby : null);
    if (!ethProvider) return alert("Install Wallet");

    try {
        const accounts = await ethProvider.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];

        provider = new ethers.providers.Web3Provider(ethProvider);
        signer = provider.getSigner();

        document.getElementById('walletName').innerText = "NODE: " + userAddress.substring(0, 10) + "...";
        document.getElementById('connectBtn').innerText = userAddress.substring(0, 6) + "...";
        document.getElementById('statusTxt').innerHTML = "<span class='live-dot'>●</span> Node: Live";
        document.getElementById('myFullAddr').innerText = userAddress;

        document.getElementById('qrImage').src =
            `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${userAddress}`;

        updateBalance();

    } catch (e) {
        console.error(e);
    }
}

async function updateBalance() {
    if (!userAddress) return;
    const bal = await provider.getBalance(userAddress);
    document.getElementById('balanceDisp').innerText =
        parseFloat(ethers.utils.formatEther(bal)).toFixed(4);
}

/* =========================
   🔹 ACTION EXECUTION
========================= */

async function executeAction() {
    if (!userAddress) return connectWallet();

    const amt = document.getElementById('inputAmt').value;
    const target = document.getElementById('recipient').value;
    const asset = document.getElementById('assetSelect').value;

    if (!amt || amt <= 0) return alert("Invalid Volume");

    try {
        document.getElementById('actionBtn').innerText = "DISPATCHING...";

        // पहले pending history डालो
        addHistory('OUTGOING', amt, asset, target, "Pending");

        const tx = await signer.sendTransaction({
            to: target,
            value: ethers.utils.parseUnits(amt, "ether")
        });

        await tx.wait();

        // success update
        addHistory('CONFIRMED', amt, asset, target, "Success");

        document.getElementById('actionBtn').innerText = "EXECUTE ENGINE";
        updateBalance();

    } catch (e) {
        addHistory('FAILED', amt, asset, target, "Failed");

        document.getElementById('actionBtn').innerText = "EXECUTE ENGINE";
        alert("Transaction Failed");
    }
}

/* =========================
   🔹 UI
========================= */

function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
    document.getElementById('tab-' + mode).classList.add('tab-active');

    const actContent = document.getElementById('actionContent');
    const recvUI = document.getElementById('receiveUI');

    if (mode === 'receive') {
        actContent.classList.add('hidden');
        recvUI.classList.remove('hidden');
    } else {
        actContent.classList.remove('hidden');
        recvUI.classList.add('hidden');
    }
}

function copyMyAddress() {
    if (!userAddress) return;
    navigator.clipboard.writeText(userAddress);
    alert("Copied!");
}

function updateTokenUI() {
    document.getElementById('tokenUnit').innerText =
        document.getElementById('assetSelect').value;
}

/* =========================
   🔹 INIT
========================= */

window.onload = () => {
    loadHistory();
};
                             </script>
