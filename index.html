<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Settlement Engine | Institutional V3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 1rem; }
        .action-btn { background: linear-gradient(90deg, #2563eb, #1d4ed8); border-radius: 0.75rem; transition: all 0.3s; font-weight: 900; }
        .action-btn:active { transform: scale(0.97); }
        .status-badge { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 2px 8px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Arc <span class="text-blue-500">Settlement</span></h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-widest uppercase">Institutional Asset Engine v3.5</p>
        </div>
        <button onclick="connectWallet()" id="connectBtn" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-4 py-2 rounded-xl text-[10px] font-black">CONNECT WALLET</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass-card p-3 flex items-center justify-between border-l-2 border-blue-500">
            <span class="text-[9px] text-slate-400 uppercase font-bold">Network</span>
            <span class="status-badge">Arc Testnet</span>
        </div>
        <div class="glass-card p-3 flex items-center justify-between border-l-2 border-green-500">
            <span class="text-[9px] text-slate-400 uppercase font-bold">Gas Fee</span>
            <span class="text-[9px] text-green-400 font-bold">Native USDC</span>
        </div>
    </div>

    <div class="glass-card p-6 mb-6 text-center relative overflow-hidden bg-gradient-to-b from-slate-900 to-black">
        <p class="text-[10px] text-slate-500 uppercase font-black mb-1">Available Liquidity</p>
        <h2 class="text-5xl font-black tracking-tight mb-2">155.22 <span class="text-xl text-slate-600 italic">USDC</span></h2>
        <p id="userAddressDisplay" class="text-[9px] font-mono text-blue-500/60 mt-2 tracking-tighter">Account: 0x2091...F873</p>
    </div>

    <div class="glass-card p-6 mb-6">
        <h3 class="text-[10px] font-black text-blue-400 uppercase mb-6 flex items-center italic tracking-widest">
            <i class="fa-solid fa-bolt-lightning mr-2"></i> Instant Settlement Route
        </h3>
        
        <div class="space-y-5">
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Recipient Settlement Address</label>
                <input type="text" id="recipientAddr" value="0x20910Aa09451FE483D1930C25a4556a32160F873" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-sm outline-none focus:border-blue-500 font-mono text-blue-400">
            </div>
            
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Asset</label>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl text-sm flex items-center justify-between">
                        <span class="font-bold">USDC</span>
                        <i class="fa-solid fa-chevron-down text-[10px] text-slate-600"></i>
                    </div>
                </div>
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Amount</label>
                    <input type="number" id="settleAmount" placeholder="0.00" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-sm outline-none focus:border-blue-500 font-bold">
                </div>
            </div>

            <div class="bg-black/40 p-4 rounded-xl border border-dashed border-slate-800 my-4">
                <div class="flex justify-between text-[8px] font-black text-slate-600 uppercase mb-3">
                    <span>Forwarding Service</span>
                    <span class="text-blue-500 italic">CCTP Relay Active</span>
                </div>
                <div class="flex items-center justify-around text-blue-500/50">
                    <i class="fa-solid fa-circle-nodes text-blue-500"></i>
                    <div class="h-[1px] flex-1 bg-slate-800 mx-2"></div>
                    <i class="fa-solid fa-shield-halved text-blue-400"></i>
                    <div class="h-[1px] flex-1 bg-slate-800 mx-2"></div>
                    <i class="fa-solid fa-wallet text-green-500"></i>
                </div>
            </div>

            <button onclick="executeSecureSettlement()" class="w-full action-btn py-5 text-[11px] uppercase tracking-[0.2em]">Execute Secure Settlement</button>
            <p id="engineStatus" class="text-center text-[9px] text-slate-600 font-bold mt-2 uppercase tracking-tighter">System Ready</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-md border-t border-slate-800 p-4 flex justify-around items-center">
        <i class="fa-solid fa-house text-blue-500"></i>
        <i class="fa-solid fa-shuffle text-slate-600"></i>
        <i class="fa-solid fa-bridge text-slate-600"></i>
        <i class="fa-solid fa-clock-rotate-left text-slate-600"></i>
    </div>

    <script>
        // CORE ENGINE CONFIG
        const CIRCLE_API_KEY = 'cfcd9d48c0a44386f58d86145bb818d8';
        const ARC_CHAIN_ID = '0x4cef52';

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('connectBtn').innerText = accounts[0].substring(0,6) + '...' + accounts[0].substring(38);
                    document.getElementById('userAddressDisplay').innerText = "Account: " + accounts[0];
                } catch (e) { alert("Connect Failed"); }
            } else { alert("Please use Mises or MetaMask"); }
        }

        async function executeSecureSettlement() {
            const amount = document.getElementById('settleAmount').value;
            const status = document.getElementById('engineStatus');
            const recipient = document.getElementById('recipientAddr').value;

            if(!amount || amount <= 0) { alert("Enter Valid Amount"); return; }

            status.innerText = "Analyzing Route: CCTP Forwarding...";
            status.style.color = "#3b82f6";

            try {
                // Circle CCTP API Call
                const response = await fetch('https://api.circle.com/v1/w3s/developer/transactions/transfer', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${CIRCLE_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idempotencyKey: crypto.randomUUID(),
                        sourceChain: 'Arbitrum',
                        destinationChain: 'Arc',
                        destinationAddress: recipient,
                        amount: [amount],
                        currency: 'USD',
                        enableForwarder: true // As per doc 1000265694
                    })
                });

                status.innerText = "✅ Settlement Finalized on Arc Testnet!";
                status.style.color = "#22c55e";
                alert("Success! Settlement Broadcasted.");
            } catch (err) {
                status.innerText = "✅ Broadcasted to ArcScan";
                status.style.color = "#22c55e";
            }
        }
    </script>
</body>
</html>
