<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Sonic Router</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; text-align: center; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #4ade80; color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <audio id="m" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <div class="glass">
        <h2 style="margin:0;">@arc Sonic</h2>
        <p style="color:#94a3b8; font-size: 0.8rem;">Stable Fee Economic OS</p>
        <button class="btn" onclick="document.getElementById('m').play(); alert('Sonic Flow Active!');">Start Terminal</button>
    </div>
</body>
                         </html>
                         
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Sonic Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-5">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-xl font-black italic text-green-400">@SONIC</h1>
        <button onclick="bol('Connecting to Mises Wallet')" class="bg-green-500 text-black px-5 py-2 rounded-full font-bold text-xs shadow-lg">CONNECT</button>
    </div>
    <div class="bg-white/5 border border-white/10 rounded-[35px] p-6 mb-6 shadow-2xl">
        <div class="flex gap-4 mb-8 text-[10px] font-bold uppercase text-slate-500">
            <button onclick="bol('Swap Mode Active')" class="text-green-400 border-b-2 border-green-400 pb-1">Swap</button>
            <button onclick="bol('Bridge Mode Active')">Bridge</button>
        </div>
        <div class="bg-black/40 rounded-2xl p-4 border border-white/5 mb-4 text-center">
            <input type="number" placeholder="0.00" class="bg-transparent text-2xl outline-none w-full font-bold text-center">
            <p class="text-[10px] text-slate-500 mt-2 font-bold italic">ASSET: USDC</p>
        </div>
        <button onclick="bol('Processing transaction on Arc Network')" class="w-full bg-green-500 text-black py-4 rounded-2xl font-black text-lg active:scale-95 transition">EXECUTE ROUTE</button>
    </div>
    <div class="bg-white/5 rounded-2xl p-4 border border-dashed border-white/20 text-center">
        <textarea id="msg" class="w-full bg-transparent outline-none text-sm h-16 text-center" placeholder="Kuch kami hai? Likhein..."></textarea>
        <button onclick="submitF()" class="text-green-400 text-[10px] font-bold underline mt-2 block mx-auto">SUBMIT FEEDBACK</button>
    </div>
    <script>
        function bol(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
        function submitF() { 
            const v = document.getElementById('msg').value;
            if(v) { bol('Feedback saved. Thank you Amrish.'); alert('Feedback Sent!'); }
        }
    </script>
</body>
            </html>
