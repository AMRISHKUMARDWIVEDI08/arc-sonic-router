<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcFlow Pro V26 - Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .banner-fix {
            background: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), url('logo.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            height: 80px; border-radius: 20px; border: 1px solid rgba(59, 130, 246, 0.2); margin-bottom: 20px;
        }
        .btn-action { background: #2563eb; font-weight: 900; }
        .input-style { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; outline: none; }
        .active-tab { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="p-4 pb-20" onclick="initMusic()">

    <div class="banner-fix flex items-center justify-center">
        <h2 class="text-sm font-black tracking-[0.5em] text-blue-400 uppercase">Arc Network</h2>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <img src="logo.png" class="h-9 w-9">
            <h1 class="font-black text-xl italic tracking-tighter uppercase leading-none">ARCFLOW <span class="text-blue-500 font-normal text-[10px] block">PRO V26</span></h1>
        </div>
        <button id="walletBtn" onclick="connectWallet()" class="glass px-5 py-2 text-[10px] font-bold text-blue-400">CONNECT WALLET</button>
    </div>

    <div class="glass p-5 mb-4 flex justify-between items-center">
        <div>
            <p class="text-[8px] font-bold text-slate-500 uppercase">Arc Balance</p>
            <h2 id="usdcBal" class="text-xl font-black text-green-400">0.00 <span class="text-xs">USDC</span></h2>
        </div>
        <div class="text-right">
            <span id="statusDot" class="inline-block h-2 w-2 bg-red-500 rounded-full mr-1"></span>
            <span id="statusText" class="text-[9px] font-bold text-slate-400 uppercase">Disconnected</span>
        </div>
    </div>

    <div class="glass p-6 mb-6">
        <div class="flex gap-6 text-[10px] font-black uppercase mb-8 border-b border-white/5 pb-2">
            <span id="t-transfer" class="active-tab pb-2">Transfer</span>
            <span class="opacity-30 pb-2">Swap</span>
            <span class="opacity-30 pb-2">Bridge</span>
        </div>

        <input type="text" id="target" placeholder="Recipient 0x..." class="input-style w-full p-4 text-xs font-mono mb-5">
        
        <div class="flex justify-between items-center mb-4 text-[9px] font-bold text-slate-500 uppercase italic">
            <span>Quick Select:</span>
            <div class="flex gap-2">
                <button onclick="setAmt(10)" class="bg-blue-900/20 px-4 py-1 rounded text-blue-400 border border-blue-500/20">10</button>
                <button onclick="setAmt(100)" class="bg-blue-900/20 px-4 py-1 rounded text-blue-400 border border-blue-500/20">100</button>
            </div>
        </div>

        <input type="number" id="mainInput" placeholder="0.00" class="input-style w-full p-5 text-4xl font-black mb-8">
        <button id="mainBtn" onclick="execute()" class="w-full btn-action py-5 rounded-2xl text-xs uppercase">Execute Sonic Route</button>
    </div>

    <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <script>
        let currentAddr = null;
        let audioActive = false;
        const music = document.getElementById('bgMusic');

        function initMusic() { if(!audioActive) { music.volume = 0.2; music.play(); audioActive = true; say("System Active"); } }

        function say(t) { const s = new SpeechSynthesisUtterance(t); window.speechSynthesis.speak(s); }

        function setAmt(v) { document.getElementById('mainInput').value = v; say("Amount " + v); }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const p = new ethers.providers.Web3Provider(window.ethereum);
                    
                    // NETWORK SELECTION LOGIC (Auto-Switch to Arc)
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x696969' }], // Arc Network Chain ID
                        });
                    } catch (err) {
                        if (err.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: '0x696969',
                                    chainName: 'Arc Network',
                                    nativeCurrency: { name: 'ARC', symbol: 'ARC', decimals: 18 },
                                    rpcUrls: ['https://rpc.arc-network.io'], // Ensure this is correct
                                    blockExplorerUrls: ['https://explorer.arc.io']
                                }]
                            });
                        }
                    }

                    await p.send("eth_requestAccounts", []);
                    currentAddr = await p.getSigner().getAddress();
                    
                    // REAL BALANCE FIX
                    const b = await p.getBalance(currentAddr);
                    document.getElementById('usdcBal').innerText = parseFloat(ethers.utils.formatEther(b)).toFixed(4) + " USDC";
                    document.getElementById('walletBtn').innerText = currentAddr.substring(0,6)+"..."+currentAddr.substring(38);
                    document.getElementById('statusDot').className = "inline-block h-2 w-2 bg-green-500 rounded-full mr-1";
                    document.getElementById('statusText').innerText = "Arc Secure";
                    say("Gateway Connected");
                } catch(e) { say("Connection Failed"); console.log(e); }
            } else { alert("Install Mises/OKX Browser"); }
        }

        function execute() {
            if(!currentAddr) return say("Connect wallet");
            music.pause();
            say("Processing transaction");
            setTimeout(() => { say("Success"); alert("Success!"); music.play(); }, 3000);
        }
    </script>
</body>
</html>
