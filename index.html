<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Settlement Engine | Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 1.25rem; }
        .action-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: all 0.3s; }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -5px rgba(37, 99, 235, 0.5); }
        @keyframes flow { 0% { left: -100%; } 100% { left: 100%; } }
        .animate-flow { position: absolute; height: 100%; background: linear-gradient(90deg, transparent, #3b82f6, transparent); width: 50%; animation: flow 2s linear infinite; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Arc <span class="text-blue-500 italic">Engine</span></h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.2em] uppercase">Liquidity Settlement v4.0</p>
        </div>
        <div class="flex items-center gap-2">
            <div class="text-right mr-1">
                <p class="text-[8px] font-black text-green-500 uppercase">AML Verified</p>
                <p class="text-[10px] font-mono text-slate-400">0.18s Latency</p>
            </div>
            <div class="bg-blue-600/10 p-3 rounded-xl border border-blue-500/20">
                <i class="fa-solid fa-building-shield text-blue-500"></i>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass-card p-3 border-l-4 border-green-500 flex items-center gap-2">
            <i class="fa-solid fa-circle-check text-green-500 text-[10px]"></i>
            <span class="text-[9px] font-black uppercase text-slate-300">Proof of Reserve: 100%</span>
        </div>
        <div class="glass-card p-3 border-l-4 border-blue-500 flex items-center gap-2">
            <i class="fa-solid fa-gas-pump text-blue-500 text-[10px]"></i>
            <span class="text-[9px] font-black uppercase text-slate-300">Gas Engine: USDC</span>
        </div>
    </div>

    <div class="glass-card p-5 mb-6 border-blue-500/30 overflow-hidden relative">
        <p class="text-[10px] font-black text-blue-400 uppercase mb-4 text-center">Active CCTP Routing Map</p>
        <div class="flex justify-between items-center px-4 relative">
            <div class="text-center z-10">
                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700 shadow-xl">
                    <i class="fa-brands fa-ethereum text-blue-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-500 uppercase tracking-tighter">Native Source</p>
            </div>
            
            <div class="flex-1 h-[2px] bg-slate-800 mx-2 relative overflow-hidden">
                <div class="animate-flow"></div>
            </div>

            <div class="text-center z-10">
                <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center border-2 border-blue-400 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-a text-white text-xl"></i>
                </div>
                <p class="text-[9px] font-black text-blue-400 italic mt-1 uppercase">Arc Node</p>
            </div>

            <div class="flex-1 h-[2px] bg-slate-800 mx-2"></div>

            <div class="text-center z-10">
                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700">
                    <i class="fa-solid fa-vault text-green-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-500 uppercase tracking-tighter">Settlement</p>
            </div>
        </div>
    </div>

    <div class="glass-card p-6 mb-8">
        <div class="space-y-5">
            <div>
                <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Recipient Vault Address</label>
                <input type="text" id="recipient" placeholder="0x..." class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-mono outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="flex gap-3">
                <div class="w-1/3">
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Settlement Asset</label>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold text-center">USDC (ARC)</div>
                </div>
                <div class="w-2/3">
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Amount</label>
                    <input type="number" id="amount" placeholder="0.00" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold outline-none focus:border-blue-500">
                </div>
            </div>
            <button onclick="handleSettlement()" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase tracking-[0.3em] text-white">Execute Settlement Route</button>
        </div>
    </div>

    <div id="status-box" class="hidden glass-card p-4 border-blue-500/50">
        <div class="flex justify-between items-center">
            <p class="text-[10px] font-bold text-blue-400 uppercase italic">Finality Tracking:</p>
            <span id="finality-timer" class="text-xs font-mono font-bold text-white">0.000s</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
            </html>
