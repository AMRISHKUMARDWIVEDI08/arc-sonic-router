<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Settlement Engine | Institutional Grade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 1.25rem; }
        .action-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: 0.3s; cursor: pointer; }
        /* Point 2: Route Animation */
        @keyframes flow { 0% { left: -100%; } 100% { left: 100%; } }
        .animate-flow { position: absolute; height: 100%; background: linear-gradient(90deg, transparent, #3b82f6, transparent); width: 50%; animation: flow 2s linear infinite; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Arc <span class="text-blue-500 italic">Engine</span></h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.2em] uppercase">Settlement Terminal v4.0</p>
        </div>
        <div class="text-right">
            <p class="text-[8px] font-black text-green-500 uppercase">AML Verified</p>
            <div class="bg-blue-600/10 p-2 rounded-xl border border-blue-500/20 mt-1">
                <i class="fa-solid fa-building-shield text-blue-500"></i>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass-card p-3 border-l-4 border-green-500 flex items-center gap-2">
            <i class="fa-solid fa-circle-check text-green-500 text-[10px]"></i>
            <span class="text-[9px] font-black uppercase">Reserve: 100%</span>
        </div>
        <div class="glass-card p-3 border-l-4 border-blue-500 flex items-center gap-2">
            <i class="fa-solid fa-gas-pump text-blue-500 text-[10px]"></i>
            <span class="text-[9px] font-black uppercase text-blue-400">Gas: USDC</span>
        </div>
    </div>

    <div class="glass-card p-5 mb-6 border-blue-500/30 overflow-hidden relative">
        <p class="text-[10px] font-black text-blue-400 uppercase mb-4 text-center tracking-widest italic">Institutional Route Mapping</p>
        <div class="flex justify-between items-center px-4 relative">
            <div class="text-center z-10">
                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700 shadow-xl">
                    <i class="fa-brands fa-ethereum text-blue-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-500 uppercase">ETH Source</p>
            </div>
            
            <div class="flex-1 h-[2px] bg-slate-800 mx-2 relative overflow-hidden">
                <div class="animate-flow"></div>
            </div>

            <div class="text-center z-10">
                <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center border-2 border-blue-400 shadow-lg shadow-blue-500/20 pulse">
                    <i class="fa-solid fa-a text-white text-xl"></i>
                </div>
                <p class="text-[9px] font-black text-blue-400 italic mt-1">ARC NODE</p>
            </div>

            <div class="flex-1 h-[2px] bg-slate-800 mx-2"></div>

            <div class="text-center z-10">
                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700">
                    <i class="fa-solid fa-vault text-green-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-500 uppercase">Settled</p>
            </div>
        </div>
    </div>

    <div class="glass-card p-6 mb-8">
        <div class="space-y-5">
            <div>
                <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Recipient Address</label>
                <input type="text" id="sim-address" placeholder="0x..." class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-mono outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-3">
                <div class="w-1/3">
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Asset</label>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold text-center">USDC</div>
                </div>
                <div class="w-2/3">
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Amount</label>
                    <input type="number" id="sim-amount" placeholder="0.00" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold outline-none">
                </div>
            </div>
            <button onclick="startSimulation()" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase tracking-[0.3em] text-white">Execute Settlement Route</button>
        </div>
    </div>

    <div id="sim-status" class="hidden glass-card p-4 border-blue-500/50">
        <div class="flex justify-between items-center">
            <p class="text-[10px] font-bold text-blue-400 uppercase italic">Settlement Finality:</p>
            <span id="sim-timer" class="text-xs font-mono font-bold text-white">0.000s</span>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-md border-t border-slate-800 p-5 flex justify-around items-center">
        <i class="fa-solid fa-house-chimney text-blue-500"></i>
        <i class="fa-solid fa-arrows-spin text-slate-600"></i>
        <i class="fa-solid fa-layer-group text-slate-600"></i>
        <i class="fa-solid fa-fingerprint text-slate-600"></i>
    </div>

    <script>
        // Simulation Logic
        function startSimulation() {
            const amount = document.getElementById('sim-amount').value;
            const address = document.getElementById('sim-address').value;

            if (!amount || !address) {
                alert("Alert: Fill Address and Amount to start Simulation.");
                return;
            }

            const statusBox = document.getElementById('sim-status');
            const timerDisplay = document.getElementById('sim-timer');
            statusBox.classList.remove('hidden');

            let start = Date.now();
            let clock = setInterval(() => {
                timerDisplay.innerText = ((Date.now() - start) / 1000).toFixed(3) + "s";
            }, 50);

            alert("Arc Engine: Analyzing Route for " + amount + " USDC...");

            setTimeout(() => {
                clearInterval(clock);
                alert("✅ SUCCESS\n\nAsset Settled on Arc Testnet\nLatency: " + timerDisplay.innerText);
            }, 2000);
        }
    </script>
</body>
                        </html>
