<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcFlow Pro - SonicRouter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .arc-banner {
            background: linear-gradient(45deg, rgba(37,99,235,0.2), rgba(126,34,206,0.2)), url('logo.png');
            background-size: cover; background-position: center;
            height: 100px; border-radius: 18px; border: 1px solid rgba(59,130,246,0.2);
        }
        .btn-blue { background: #2563eb; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .input-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; outline: none; }
    </style>
</head>
<body class="p-4 pb-20" onclick="startExperience()">

    <div class="arc-banner w-full mb-6 flex items-center justify-center">
        <h1 class="text-xl font-black italic tracking-widest text-white drop-shadow-md">ARC NETWORK</h1>
    </div>

    <div class="flex justify-between items-center mb-6 px-2">
        <div class="flex items-center gap-2">
            <img src="logo.png" class="h-8 w-8 object-contain">
            <h2 class="font-bold text-sm tracking-tighter">ArcFlow <span class="text-blue-500">Pro</span></h2>
        </div>
        <button id="walletBtn" onclick="connectWallet()" class="glass px-4 py-2 text-[10px] font-bold text-blue-400 border-blue-500/30">CONNECT</button>
    </div>

    <div class="glass p-5 mb-4 flex justify-between items-center border-blue-500/10">
        <div>
            <p class="text-[8px] font-bold text-slate-500 uppercase">Current Balance</p>
            <h2 id="realBal" class="text-xl font-black text-green-400">0.00 <span class="text-xs text-slate-400">USDC</span></h2>
        </div>
        <div class="text-right">
            <div id="statusDot" class="h-2 w-2 bg-red-500 rounded-full inline-block"></div>
            <p id="statusText" class="text-[8px] font-bold text-slate-500 uppercase">Offline</p>
        </div>
    </div>

    <div class="glass p-6 mb-6">
        <div class="flex gap-4 text-[10px] font-black uppercase mb-8 border-b border-white/5 pb-2">
            <span class="text-blue-500 border-b-2 border-blue-500 pb-2">Transfer</span>
            <span class="opacity-30">Swap</span>
            <span class="opacity-30">Bridge</span>
        </div>

        <input type="text" id="target" placeholder="Recipient (0x...)" class="input-box w-full p-4 text-xs font-mono mb-4">
        
        <div class="flex justify-between mb-2">
            <span class="text-[9px] font-bold text-slate-500 uppercase italic">Amount:</span>
            <div class="flex gap-2">
                <button onclick="setAmt(10)" class="bg-blue-900/20 px-3 py-1 rounded text-[9px] font-bold">10</button>
                <button onclick="setAmt(100)" class="bg-blue-900/20 px-3 py-1 rounded text-[9px] font-bold">100</button>
            </div>
        </div>
        <input type="number" id="amtInput" placeholder="0.00" class="input-box w-full p-5 text-4xl font-black mb-8">

        <button onclick="execute()" class="w-full btn-blue py-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">
            Execute Sonic Route
        </button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let wallet = null;
        let audioInited = false;
        const music = document.getElementById('bgMusic');

        function startExperience() {
            if (!audioInited) {
                music.volume = 0.3;
                music.play();
                audioInited = true;
                say("Arc Gateway Activated");
            }
        }

        function say(t) {
            const s = new SpeechSynthesisUtterance(t);
            window.speechSynthesis.speak(s);
        }

        function setAmt(v) { 
            document.getElementById('amtInput').value = v;
            say("Amount set to " + v);
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const p = new ethers.providers.Web3Provider(window.ethereum);
                    await p.send("eth_requestAccounts", []);
                    const signer = p.getSigner();
                    wallet = await signer.getAddress();
                    
                    // Asli Balance Fetching Logic
                    const b = await p.getBalance(wallet);
                    const formatted = parseFloat(ethers.utils.formatEther(b)).toFixed(4);
                    
                    document.getElementById('realBal').innerText = formatted + " USDC";
                    document.getElementById('walletBtn').innerText = wallet.substring(0,6)+"..."+wallet.substring(38);
                    document.getElementById('statusDot').className = "h-2 w-2 bg-green-500 rounded-full inline-block";
                    document.getElementById('statusText').innerText = "Network Secure";
                    
                    say("Wallet Connected. Balance updated.");
                } catch(e) { say("Error connecting wallet"); }
            }
        }

        function execute() {
            if(!wallet) return say("Please connect first");
            
            // Stop music during action
            music.pause();
            say("Processing Transaction. Please wait.");
            
            setTimeout(() => {
                say("Transaction Successful.");
                alert("Success!");
                // Resume music after action
                music.play();
            }, 3000);
        }
    </script>
</body>
</html>
