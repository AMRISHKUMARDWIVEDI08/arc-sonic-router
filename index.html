<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Settlement Engine | V3.5 Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 1.25rem; }
        .action-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-btn { padding: 12px; font-size: 10px; font-weight: 800; color: #64748b; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .hidden-section { display: none; }
        @keyframes move_2s_linear_infinite { 0% { left: -100%; } 100% { left: 100%; } }
        #route-flow { animation: move_2s_linear_infinite 2s linear infinite; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white">ARC <span class="text-blue-500 italic">SETTLEMENT</span></h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.3em] uppercase">Liquidity Engine v3.5</p>
        </div>
        <button onclick="connectWallet()" id="walletBtn" class="bg-blue-600/10 p-3 rounded-2xl border border-blue-500/20 text-blue-500 text-[10px] font-black uppercase">
            Connect Wallet
        </button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass-card p-3 border-l-2 border-green-500 flex items-center gap-2">
            <i class="fa-solid fa-user-shield text-green-500 text-[10px]"></i>
            <span class="text-[10px] font-bold uppercase">AML Verified</span>
        </div>
        <div class="glass-card p-3 border-l-2 border-blue-500 flex items-center gap-2">
            <i class="fa-solid fa-chart-pie text-blue-500 text-[10px]"></i>
            <span class="text-[10px] font-bold uppercase">100% Backed</span>
        </div>
    </div>

    <div class="glass-card p-5 mb-6 bg-gradient-to-br from-slate-900 to-slate-950">
        <p class="text-[10px] font-black text-blue-400 uppercase mb-4 italic text-center">Institutional Route Mapping</p>
        <div class="flex justify-between items-center px-4 relative">
            <div class="text-center"><i class="fa-brands fa-ethereum text-blue-400 text-lg"></i><p class="text-[7px] mt-1">SOURCE</p></div>
            <div class="flex-1 h-[2px] bg-slate-800 mx-2 relative overflow-hidden"><div class="absolute h-full bg-blue-500 w-1/2" id="route-flow"></div></div>
            <div class="text-center"><div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center shadow-lg border border-blue-400"><i class="fa-solid fa-a text-white"></i></div><p class="text-[8px] font-black text-blue-400 mt-1">ARC NODE</p></div>
            <div class="flex-1 h-[2px] bg-slate-800 mx-2"></div>
            <div class="text-center"><i class="fa-solid fa-building-columns text-green-400 text-lg"></i><p class="text-[7px] mt-1">SETTLE</p></div>
        </div>
    </div>

    <div class="glass-card p-6 mb-6">
        <p class="text-[10px] text-slate-500 uppercase font-black">Net Liquidity</p>
        <h2 id="balanceDisp" class="text-4xl font-black tracking-tighter">0.00 <span class="text-lg text-slate-600 italic font-normal">USDC</span></h2>
        <div class="flex justify-between mt-3">
            <span class="text-[8px] font-bold text-yellow-500/80 bg-yellow-500/10 px-2 py-1 rounded">USYC: 0.00</span>
            <span class="text-[8px] font-bold text-blue-400 bg-blue-400/10 px-2 py-1 rounded">GAS: NATIVE USDC</span>
        </div>
    </div>

    <div class="flex justify-around mb-4 border-b border-slate-800">
        <button onclick="showTab('transfer')" id="btn-transfer" class="tab-btn tab-active uppercase">Transfer</button>
        <button onclick="showTab('swap')" id="btn-swap" class="tab-btn uppercase">Swap</button>
        <button onclick="showTab('bridge')" id="btn-bridge" class="tab-btn uppercase">Bridge</button>
    </div>

    <div class="glass-card p-6">
        <div id="sec-transfer" class="space-y-4">
            <input type="text" id="target" placeholder="Recipient Address (0x...)" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-mono outline-none focus:border-blue-500">
            <input type="number" id="amt" placeholder="Amount USDC" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold outline-none">
            <button onclick="executeAction('Transfer')" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase text-white tracking-widest">Execute Settlement</button>
        </div>

        <div id="sec-swap" class="hidden-section space-y-4 text-center">
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex justify-between"><span class="text-xs">USDC</span><i class="fa-solid fa-right-left text-blue-500"></i><span class="text-xs">USYC</span></div>
            <button onclick="executeAction('Swap')" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase text-white">Execute Swap</button>
        </div>

        <div id="sec-bridge" class="hidden-section space-y-4 text-center">
            <p class="text-[10px] font-bold text-slate-500">ARBITRUM ➔ ARC NETWORK</p>
            <button onclick="executeAction('Bridge')" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase text-white">Initiate Bridge</button>
        </div>
    </div>

    <div id="status-box" class="hidden mt-4 glass-card p-3 border-blue-500/50 text-center">
        <p class="text-[10px] font-bold text-blue-400 uppercase">Settlement Speed: <span id="timer" class="text-white font-mono">0.000s</span></p>
    </div>

    <script>
        const ARC_RPC = "https://arc-testnet.rpc.caldera.xyz/http";
        const ARC_CHAIN_ID = "0x4cef52";

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const balance = await provider.getBalance(accounts[0]);
                    
                    document.getElementById('walletBtn').innerText = accounts[0].substring(0, 6) + "...";
                    document.getElementById('balanceDisp').innerHTML = `${ethers.utils.formatEther(balance).substring(0, 5)} <span class="text-lg text-slate-600 italic font-normal">USDC</span>`;
                    
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: ARC_CHAIN_ID, chainName: 'Arc Testnet', nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 }, rpcUrls: [ARC_RPC] }]
                    });
                } catch (e) { alert("Authorization Error"); }
            } else { alert("Use Mises Browser"); }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-'+id).classList.add('tab-active');
            document.getElementById('sec-transfer').classList.add('hidden-section');
            document.getElementById('sec-swap').classList.add('hidden-section');
            document.getElementById('sec-bridge').classList.add('hidden-section');
            document.getElementById('sec-'+id).classList.remove('hidden-section');
        }

        function executeAction(type) {
            const statusBox = document.getElementById('status-box');
            const timer = document.getElementById('timer');
            statusBox.classList.remove('hidden');
            let start = Date.now();
            let clock = setInterval(() => { timer.innerText = ((Date.now() - start) / 1000).toFixed(3) + "s"; }, 50);
            alert(`Broadcasting ${type} to Arc Nodes...`);
            setTimeout(() => { clearInterval(clock); alert(`✅ ${type} Successful on Arc Testnet!`); }, 2000);
        }
    </script>
</body>
    </html>
