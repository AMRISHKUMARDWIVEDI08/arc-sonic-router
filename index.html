<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARC ENGINE ROUTER | Institutional Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 1.5rem; backdrop-filter: blur(10px); }
        .tab-btn { font-size: 11px; font-weight: 900; color: #64748b; padding: 12px; border-radius: 12px; transition: 0.3s; text-transform: uppercase; border: 1px solid transparent; }
        .tab-active { color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }
        .input-field { background: #0f172a; border: 1px solid #1e293b; padding: 14px; border-radius: 14px; width: 100%; color: white; font-weight: bold; outline: none; font-size: 13px; }
        .glow-blue { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-8 pt-2">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Arc" class="w-12 h-12 rounded-xl border border-blue-500/30 object-cover shadow-lg shadow-blue-500/20" onerror="this.src='https://arc.xyz/favicon.ico'">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white leading-none">
                    ARC <span class="text-blue-500">ENGINE</span>
                </h1>
                <p id="statusTxt" class="text-[8px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-1 italic">● Node: Standby</p>
            </div>
        </div>
        <button onclick="connectWallet()" id="connectBtn" class="bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-900/40 active:scale-95 transition-all">Connect Wallet</button>
    </div>

    <div class="glass-card p-7 mb-6 bg-gradient-to-br from-slate-900 via-slate-950 to-black relative">
        <div class="flex justify-between mb-2">
            <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Institutional Assets</span>
            <span id="chainTag" class="text-[8px] font-bold text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded border border-blue-500/20 uppercase">Network Offline</span>
        </div>
        <div class="flex items-baseline gap-2 mb-2">
            <h2 id="balanceDisp" class="text-6xl font-black tracking-tighter text-white glow-blue">0.0000</h2>
            <span id="tokenUnit" class="text-xl text-slate-600 font-bold italic uppercase">ETH</span>
        </div>
        <p class="text-[10px] text-slate-500 font-mono italic">Prev: <span id="prevBalance">0.0000</span> ETH</p>
        
        <div class="flex justify-between items-center text-[9px] border-t border-slate-800/50 pt-5 font-mono text-slate-500 uppercase mt-4 tracking-tighter">
            <span id="walletName">ID: AWAITING_AUTH</span>
            <span class="text-green-500 font-bold italic tracking-widest">Verified Engine</span>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-6 bg-slate-900/50 p-1.5 rounded-2xl border border-slate-800/50 shadow-inner">
        <button onclick="switchMode('send')" id="tab-send" class="tab-btn">SEND</button>
        <button onclick="switchMode('swap')" id="tab-swap" class="tab-btn">SWAP</button>
        <button onclick="switchMode('bridge')" id="tab-bridge" class="tab-btn tab-active">BRIDGE</button>
    </div>

    <div class="glass-card p-6 shadow-2xl">
        <div class="space-y-5">
            <div id="routeMap" class="flex justify-between items-center text-[10px] font-black uppercase italic px-1 opacity-60">
                <span id="fromText">From: Arbitrum</span>
                <i class="fa-solid fa-right-left text-blue-500 mx-2"></i>
                <span id="toText" class="text-blue-500">To: Arc Network</span>
            </div>

            <div id="addrBox">
                <label class="text-[9px] font-black text-slate-500 uppercase ml-1 tracking-widest">Target Node Address</label>
                <input type="text" id="recipient" value="0x20910Aa09451FE483D1930C25a4556a32160F873" class="input-field font-mono text-blue-400 mt-1">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase ml-1">Asset Class</label>
                    <select id="assetSelect" onchange="updateTokenUI()" class="input-field text-xs font-bold mt-1">
                        <option value="ETH">Native ETH</option>
                        <option value="USDC">USDC (Circle)</option>
                        <option value="USYC">USYC (Yield)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase ml-1">Volume</label>
                    <input type="number" id="inputAmt" placeholder="0.00" class="input-field text-xs font-bold mt-1">
                </div>
            </div>

            <button onclick="executeAction()" id="actionBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4.5 rounded-2xl text-[12px] font-black uppercase tracking-[0.2em] shadow-xl shadow-blue-600/10 transition-all mt-2 active:scale-[0.98]">Authorize Engine</button>
            <p id="log" class="text-center text-[8px] text-slate-600 font-bold uppercase mt-2 italic">Status: Engine Operational</p>
        </div>
    </div>

    <script>
        let provider, signer, userAddress, currentMode = 'bridge';
        let lastBalance = 0;

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    userAddress = accounts[0];
                    signer = provider.getSigner();

                    document.getElementById('walletName').innerText = "NODE_ID: " + userAddress.substring(0, 10).toUpperCase() + "...";
                    document.getElementById('connectBtn').innerText = userAddress.substring(0, 6) + "...";
                    document.getElementById('statusTxt').innerText = "● Node: Live & Connected";
                    document.getElementById('statusTxt').style.color = "#22c55e";
                    document.getElementById('chainTag').innerText = "ACTIVE MAINNET";
                    
                    updateBalance();
                } catch (e) { console.error(e); }
            } else { alert("Mises Browser use karein!"); }
        }

        async function updateBalance() {
            if(!userAddress) return;
            const bal = await provider.getBalance(userAddress);
            const formatted = parseFloat(ethers.utils.formatEther(bal)).toFixed(4);
            
            // Age-Peeche Logic: Current balance updates, and old balance goes to Prev
            document.getElementById('prevBalance').innerText = lastBalance || formatted;
            document.getElementById('balanceDisp').innerText = formatted;
            lastBalance = formatted;
        }

        function updateTokenUI() {
            document.getElementById('tokenUnit').innerText = document.getElementById('assetSelect').value;
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + mode).classList.add('tab-active');
            
            const addrSection = document.getElementById('addrBox');
            if (mode === 'swap') {
                addrSection.style.display = 'none';
                document.getElementById('fromText').innerText = "USDC (Sell)";
                document.getElementById('toText').innerText = "ETH (Buy)";
            } else if (mode === 'send') {
                addrSection.style.display = 'block';
                document.getElementById('fromText').innerText = "My Wallet";
                document.getElementById('toText').innerText = "Receiver";
            } else {
                addrSection.style.display = 'block';
                document.getElementById('fromText').innerText = "Arbitrum";
                document.getElementById('toText').innerText = "Arc Network";
            }
            if (userAddress) document.getElementById('actionBtn').innerText = "EXECUTE " + mode.toUpperCase();
        }

        async function executeAction() {
            if (!userAddress) return connectWallet();
            const log = document.getElementById('log');
            const amt = document.getElementById('inputAmt').value;
            if (!amt || amt <= 0) { alert("Dabba khali hai! Amount daaliye."); return; }

            log.innerText = "INITIATING " + currentMode.toUpperCase() + "...";
            log.style.color = "#3b82f6";

            try {
                const tx = await signer.sendTransaction({
                    to: document.getElementById('recipient').value,
                    value: ethers.utils.parseUnits(amt, "ether")
                });
                
                log.innerText = "WAITING FOR BLOCK...";
                await tx.wait(); 
                
                log.innerText = "✅ SUCCESS! BALANCE UPDATED";
                log.style.color = "#22c55e";
                
                // Fetch new balance and move current to 'Prev'
                setTimeout(updateBalance, 2000); 

            } catch (e) {
                log.innerText = "❌ SECURITY REJECTION";
                log.style.color = "#ef4444";
            }
        }
    </script>
</body>
    </html>
