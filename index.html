<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcFlow Pro V26 - Ruhani Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .tab-btn { background: #1e293b; color: #94a3b8; padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .tab-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .hidden-ui { display: none; }
    </style>
</head>
<body class="p-4 pb-24" id="mainBody">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black italic tracking-tighter">ArcFlow <span class="text-blue-500 font-bold text-[10px] not-italic uppercase">Pro V26</span></h1>
        <div class="text-blue-500 opacity-50"><i class="fa-solid fa-wind text-xl"></i></div>
    </div>

    <div class="glass p-6 mb-6">
        <div class="flex gap-2 mb-8">
            <button id="connectBtn" onclick="handleConnect()" class="bg-blue-600 px-6 py-2 rounded-lg text-xs font-bold shadow-lg shadow-blue-900/40">Connect</button>
            <button class="bg-slate-800 px-4 py-2 rounded-lg text-[10px] font-bold">Arc Net</button>
            <button class="bg-slate-800 px-4 py-2 rounded-lg text-[10px] font-bold">Arb Net</button>
        </div>

        <div class="flex justify-between items-end">
            <div>
                <span id="dot" class="h-2 w-2 bg-red-500 rounded-full inline-block mr-1"></span>
                <span id="status" class="text-[10px] text-slate-500 font-bold uppercase">Disconnected</span>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-blue-500 font-black uppercase mb-1">Arc Testnet</p>
                <p id="balUSDC" class="text-2xl font-black">0.00 <span class="text-xs text-slate-500">USDC</span></p>
            </div>
        </div>
    </div>

    <div class="flex gap-2 mb-6 overflow-x-auto no-scrollbar">
        <div id="btn-transfer" onclick="switchTab('transfer')" class="tab-btn tab-active">Transfer</div>
        <div id="btn-swap" onclick="switchTab('swap')" class="tab-btn">Swap</div>
        <div id="btn-pools" onclick="switchTab('pools')" class="tab-btn">Pools</div>
        <div id="btn-bridge" onclick="switchTab('bridge')" class="tab-btn">Bridge</div>
    </div>

    <div class="glass p-6 min-h-[350px]">
        <div id="ui-transfer">
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-6 italic tracking-widest">Send Spiritual Energy</p>
            <input type="text" placeholder="Recipient 0x..." class="w-full bg-slate-900/50 border border-slate-800 p-4 rounded-xl text-sm mb-4 outline-none">
            <input type="number" placeholder="0.00" class="w-full bg-slate-950 border border-slate-800 p-6 rounded-2xl text-3xl font-black mb-8 text-center outline-none">
            <button onclick="executeTx()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs tracking-[0.3em]">Execute Sonic Route</button>
        </div>

        <div id="ui-swap" class="hidden-ui text-center py-20 opacity-40">
            <i class="fa-solid fa-arrows-rotate text-4xl mb-4 text-blue-500"></i>
            <p class="text-[10px] font-bold uppercase tracking-widest">Swap Engine Initializing...</p>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>
    <audio id="beepSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        const music = document.getElementById('bgMusic');
        const beep = document.getElementById('beepSound');
        let isStarted = false;

        // Har click par Beep aur Music start logic
        function playBeep() { 
            beep.volume = 0.3;
            beep.currentTime = 0;
            beep.play(); 
        }

        function startExperience() {
            if(!isStarted) {
                music.volume = 0.15; // Soft music
                music.play();
                isStarted = true;
                const talk = new SpeechSynthesisUtterance("Arc Flow Gateway Activated");
                window.speechSynthesis.speak(talk);
            }
        }

        function switchTab(target) {
            playBeep();
            startExperience();
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + target).classList.add('tab-active');
            
            document.getElementById('ui-transfer').classList.add('hidden-ui');
            document.getElementById('ui-swap').classList.add('hidden-ui');
            
            if(target === 'transfer') document.getElementById('ui-transfer').classList.remove('hidden-ui');
            if(target === 'swap') document.getElementById('ui-swap').classList.remove('hidden-ui');
        }

        async function handleConnect() {
            playBeep();
            startExperience();
            if(window.ethereum) {
                const p = new ethers.providers.Web3Provider(window.ethereum);
                await p.send("eth_requestAccounts", []);
                document.getElementById('dot').className = "h-2 w-2 bg-green-500 rounded-full";
                document.getElementById('status').innerText = "Connected";
            }
        }

        function executeTx() {
            playBeep();
            // Transaction shuru: Music BAND
            music.pause();
            const talk = new SpeechSynthesisUtterance("Processing Transaction. Please wait.");
            window.speechSynthesis.speak(talk);
            
            alert("Transaction Processing...");

            setTimeout(() => {
                // Transaction puri: Music CHALNE LAGA
                music.play();
                const done = new SpeechSynthesisUtterance("Transaction Successful. Gateway restored.");
                window.speechSynthesis.speak(done);
                alert("Success! Check Explorer.");
            }, 5000);
        }

        // Screen par kahin bhi click karne se music activate hoga
        document.getElementById('mainBody').addEventListener('click', startExperience, {once: true});
    </script>
    <script>
    // 1. Ruhani Music & Beep Setup
    const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3');
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.15; // Soft volume

    // 2. Interaction Logic (Music & Beeps start on first click)
    document.addEventListener('click', (e) => {
        // Music start logic
        if (bgMusic.paused) {
            bgMusic.play().catch(() => console.log("User interaction required"));
            const talk = new SpeechSynthesisUtterance("ArcFlow System Online");
            window.speechSynthesis.speak(talk);
        }

        // 3. Har option par Beep sound
        // Agar click kisi button ya tab par hua hai to beep bajega
        if (e.target.tagName === 'BUTTON' || e.target.closest('.tab-item') || e.target.closest('.grid-card')) {
            beep.currentTime = 0;
            beep.play();
        }
    });

    // 4. Transaction Logic (Music control)
    // Jab "Confirm Send" ya "Execute" dabayein, is function ko call karein
    function startTransaction() {
        bgMusic.pause(); // Transaction ke samaye music BAND
        const msg = new SpeechSynthesisUtterance("Processing transaction. Please wait.");
        window.speechSynthesis.speak(msg);

        // Maan lo transaction 5 second mein puri hui
        setTimeout(() => {
            bgMusic.play(); // Transaction puri hone par music CHALNE LAGA
            const success = new SpeechSynthesisUtterance("Transaction successful.");
            window.speechSynthesis.speak(success);
        }, 5000);
    }

    // Is function ko apne existing "Confirm Send" button ke onclick mein jod dein
    // Example: <button onclick="startTransaction(); originalFunction();">Confirm Send</button>
    </script>
    
</body>
</html>
