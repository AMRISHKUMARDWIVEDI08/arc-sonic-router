<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicFlow Pro - Amrish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: radial-gradient(circle at top, #0f172a, #000); color: white; font-family: sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        .status-active { background: #4ade80; box-shadow: 0 0 12px #4ade80; }
        .btn-gradient { background: linear-gradient(90deg, #3b82f6, #2563eb); transition: all 0.3s; }
        .btn-gradient:hover { box-shadow: 0 0 20px rgba(37, 99, 235, 0.6); }
    </style>
</head>
<body class="p-4" onclick="initAudio()">

    <div class="flex justify-between items-center mb-10 mt-2 px-2">
        <div>
            <h1 class="text-2xl font-black italic text-green-400 tracking-tighter">SONIC<span class="text-white">FLOW</span></h1>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full status-active animate-pulse"></div>
                <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Network Secure</span>
            </div>
        </div>
        <button id="walletBtn" onclick="toggleWallet()" class="glass px-4 py-2 text-[10px] font-black border-white/20 text-blue-400 uppercase tracking-widest">
            Connect Wallet
        </button>
    </div>

    <div class="glass p-6 mb-8 shadow-2xl border-white/5">
        <div class="flex justify-between text-[10px] font-black text-slate-500 uppercase mb-8 border-b border-white/5 pb-2">
            <span class="text-green-400 border-b-2 border-green-400">Transfer</span>
            <span>Bridge</span>
            <span>Swap</span>
        </div>

        <div class="bg-black/40 rounded-3xl p-5 mb-6 border border-white/5">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[9px] font-bold text-slate-500 uppercase">Amount to Send</span>
                <span id="balLabel" class="text-[9px] font-mono text-green-500">Balance: 0.00</span>
            </div>
            <div class="flex justify-between items-center">
                <input type="number" id="amt" placeholder="0.00" class="bg-transparent text-4xl font-black outline-none w-2/3">
                <div class="bg-white/5 px-4 py-2 rounded-2xl border border-white/10 text-xs font-bold">USDC</div>
            </div>
        </div>

        <button onclick="processRoute()" class="w-full btn-gradient py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg active:scale-95">
            Execute Sonic Route
        </button>
    </div>

    <div class="grid grid-cols-2 gap-4 text-center opacity-60">
        <div class="glass p-4 border-white/5"><p class="text-[8px] font-bold uppercase tracking-widest text-slate-400">Ecosystem</p></div>
        <div class="glass p-4 border-white/5"><p class="text-[8px] font-bold uppercase tracking-widest text-slate-400">Support</p></div>
    </div>

    <script>
        let provider, signer, address = null;
        let audioInited = false;

        // Voice Function
        function speak(text) {
            if (window.speechSynthesis) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1;
                msg.pitch = 1.2;
                window.speechSynthesis.speak(msg);
            }
        }

        function initAudio() { audioInited = true; }

        async function toggleWallet() {
            // Agar pehle se connected hai toh Disconnect karein
            if (address) {
                address = null;
                document.getElementById('walletBtn').innerText = "Connect Wallet";
                document.getElementById('balLabel').innerText = "Balance: 0.00";
                speak("Wallet Disconnected");
                return;
            }

            // Connect Logic
            if (window.ethereum) {
                try {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    address = await signer.getAddress();
                    
                    document.getElementById('walletBtn').innerText = address.substring(0,6) + "..." + address.substring(38);
                    
                    // Voice Alert
                    speak("Wallet Connected");
                    
                    // Balance Simulation
                    document.getElementById('balLabel').innerText = "Balance: 1,250.40";
                } catch (err) {
                    console.log("User Cancelled");
                }
            } else {
                alert("Please open in Mises Browser");
            }
        }

        function processRoute() {
            const amount = document.getElementById('amt').value;
            if (!address) return speak("Please connect wallet first");
            if (!amount) return speak("Enter amount");
            speak("Processing transaction");
            alert("Transaction Submitted on Arc Network!");
        }
    </script>
</body>
                </html>
